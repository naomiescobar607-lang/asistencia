<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia QR — C.E. Prof. Carlos Lobato</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --card: #ffffff;
  --border: #e2e8f0;
  --accent: #1d4ed8;
  --accent2: #0ea5e9;
  --green: #059669;
  --red: #dc2626;
  --yellow: #d97706;
  --text: #0f172a;
  --muted: #64748b;
  --nav: #0f172a;
  --nav-text: #f8fafc;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* NAV */
nav {
  background: var(--nav);
  color: var(--nav-text);
  padding: 0 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}

.nav-inner {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  height: 60px;
  flex-wrap: wrap;
  padding: 0.4rem 0;
}

.logo-block { flex: 1; min-width: 140px; }
.logo-main { font-size: 1rem; font-weight: 900; line-height: 1.1; color: #fff; }
.logo-sub { font-size: 0.65rem; color: #94a3b8; font-weight: 400; }

.nav-tabs { display: flex; gap: 2px; }

.nav-tab {
  padding: 0.45rem 0.85rem;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: #94a3b8;
  font-family: 'Outfit', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.nav-tab:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav-tab.active { background: var(--accent); color: #fff; }

/* MAIN */
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

.panel { display: none; }
.panel.active { display: block; animation: fadeUp 0.35s ease; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(14px); }
  to { opacity:1; transform:translateY(0); }
}

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.card-title {
  font-size: 1rem;
  font-weight: 800;
  margin-bottom: 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  color: var(--text);
}

.card-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
}

/* SCANNER */
.scanner-wrap {
  position: relative;
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  border-radius: 16px;
  overflow: hidden;
  background: #000;
  aspect-ratio: 1;
  border: 3px solid var(--nav);
}

#scanner-video { width:100%; height:100%; object-fit:cover; display:block; }
#scanner-canvas { display:none; }

.scan-overlay {
  position: absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}

.scan-frame {
  width:60%; height:60%;
  border: 3px solid #fff;
  border-radius: 12px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
}

.scan-line {
  position:absolute;
  left:20%; right:20%;
  height:2px;
  background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  animation: scanline 1.8s linear infinite;
  display:none;
}

@keyframes scanline {
  0% { top:20%; } 100% { top:80%; }
}

.status-bar {
  display:flex; align-items:center; gap:0.6rem;
  padding:0.7rem 1rem;
  border-radius:10px;
  background: var(--bg);
  border:1px solid var(--border);
  font-size:0.82rem;
  font-weight:600;
  margin-bottom:1rem;
}

.dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.dot.on { background:var(--green); animation: blink 1s infinite; }
.dot.off { background:#cbd5e1; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* RESULT */
#att-result {
  display:none;
  text-align:center;
  padding:2rem 1.5rem;
  border-radius:14px;
  margin-top:1.2rem;
  animation: fadeUp 0.3s ease;
}

#att-result.ok { background:#ecfdf5; border:2px solid var(--green); }
#att-result.dup { background:#fffbeb; border:2px solid var(--yellow); }
#att-result.err { background:#fef2f2; border:2px solid var(--red); }

.att-icon { font-size:3rem; margin-bottom:0.5rem; }
.att-nombre { font-size:1.3rem; font-weight:800; margin-bottom:0.3rem; }
.att-sub { font-size:0.82rem; color:var(--muted); }
.att-nie { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--muted); margin-top:0.2rem; }

/* BUTTONS */
.btn {
  display:inline-flex; align-items:center; gap:0.4rem;
  padding:0.65rem 1.3rem;
  border-radius:10px; border:none;
  font-family:'Outfit',sans-serif;
  font-size:0.85rem; font-weight:700;
  cursor:pointer; transition:all 0.2s;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#1e40af; transform:translateY(-1px); }
.btn-outline { background:transparent; color:var(--accent); border:2px solid var(--accent); }
.btn-outline:hover { background:var(--accent); color:#fff; }
.btn-ghost { background:var(--border); color:var(--text); }
.btn-ghost:hover { background:#cbd5e1; }
.btn-danger { background:var(--red); color:#fff; }
.btn-sm { padding:0.38rem 0.8rem; font-size:0.75rem; }
.btn-green { background:var(--green); color:#fff; }
.flex-row { display:flex; align-items:center; gap:0.7rem; flex-wrap:wrap; }
.mt1 { margin-top:1rem; }

/* SEARCH & FILTER */
input[type=text], select {
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:10px;
  padding:0.6rem 1rem;
  color:var(--text);
  font-family:'Outfit',sans-serif;
  font-size:0.88rem;
  outline:none;
  transition:border-color 0.2s;
}
input[type=text]:focus, select:focus { border-color:var(--accent); }

/* YEAR TABS */
.year-tabs { display:flex; gap:0.4rem; margin-bottom:1.2rem; flex-wrap:wrap; }
.year-tab {
  padding:0.4rem 1rem;
  border-radius:8px;
  border:2px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-family:'Outfit',sans-serif;
  font-size:0.8rem;
  font-weight:700;
  cursor:pointer;
  transition:all 0.2s;
}
.year-tab.active { border-color:var(--accent); background:var(--accent); color:#fff; }

/* STUDENT GRID */
.student-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
  gap:0.8rem;
}

.stu-card {
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1rem;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
}

.stu-card:hover { border-color:var(--accent); box-shadow:0 4px 14px rgba(29,78,216,0.12); transform:translateY(-2px); }

.stu-av {
  width:42px; height:42px;
  border-radius:10px;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; font-weight:800; color:#fff;
  margin-bottom:0.7rem;
}

.stu-name { font-size:0.82rem; font-weight:700; line-height:1.3; margin-bottom:0.2rem; }
.stu-nie { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--muted); }
.stu-grade {
  display:inline-block;
  margin-top:0.4rem;
  padding:0.18rem 0.55rem;
  border-radius:6px;
  font-size:0.68rem;
  font-weight:700;
}
.grade-1 { background:#dbeafe; color:#1d4ed8; }
.grade-2 { background:#d1fae5; color:#059669; }
.grade-3 { background:#fef3c7; color:#d97706; }

/* QR MODAL */
.modal-bg {
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,0.7);
  z-index:300;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(6px);
}
.modal-bg.open { display:flex; }

.modal {
  background:#fff;
  border-radius:20px;
  padding:2rem;
  width:90%;
  max-width:360px;
  text-align:center;
  animation:fadeUp 0.3s ease;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

.modal h3 { font-size:1.15rem; font-weight:800; margin-bottom:0.2rem; }
.modal .modal-sub { font-size:0.78rem; color:var(--muted); margin-bottom:0.3rem; }
.modal .modal-nie { font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--accent); font-weight:700; margin-bottom:1.2rem; }
#qr-wrap { display:flex; justify-content:center; margin-bottom:1.2rem; }
#qr-wrap canvas, #qr-wrap img { border-radius:10px; border:3px solid #0f172a; }

/* LOGS */
.log-table { width:100%; border-collapse:collapse; font-size:0.8rem; }
.log-table th {
  text-align:left; padding:0.6rem 0.9rem;
  background:var(--bg);
  font-size:0.7rem; text-transform:uppercase;
  letter-spacing:0.05em; color:var(--muted);
  font-weight:700;
}
.log-table td { padding:0.65rem 0.9rem; border-bottom:1px solid var(--border); }
.log-table tr:last-child td { border-bottom:none; }
.log-table tr:hover td { background:#f8fafc; }

.badge {
  display:inline-block;
  padding:0.18rem 0.6rem;
  border-radius:6px;
  font-size:0.68rem;
  font-weight:700;
}
.badge-green { background:#d1fae5; color:#059669; }
.badge-blue { background:#dbeafe; color:#1d4ed8; }

/* REPORT */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:0.8rem; margin-bottom:1.2rem; }
@media(max-width:480px){ .stats-row { grid-template-columns:1fr 1fr; } }

.stat-box {
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1rem;
  text-align:center;
}
.stat-val { font-size:2rem; font-weight:900; color:var(--accent); line-height:1; }
.stat-lbl { font-size:0.68rem; color:var(--muted); margin-top:0.35rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; }

.rep-row {
  display:flex; align-items:center; gap:0.9rem;
  padding:0.75rem 0;
  border-bottom:1px solid var(--border);
}
.rep-row:last-child { border-bottom:none; }

.rep-av {
  width:36px; height:36px;
  border-radius:9px;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-size:0.85rem; font-weight:800; color:#fff; flex-shrink:0;
}

.rep-info { flex:1; min-width:0; }
.rep-name { font-size:0.82rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rep-grade { font-size:0.68rem; color:var(--muted); }

.prog-wrap { flex:1; min-width:80px; }
.prog-bg { height:5px; background:var(--border); border-radius:3px; overflow:hidden; margin-bottom:0.18rem; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:3px; transition:width 0.5s ease; }
.prog-lbl { font-size:0.65rem; color:var(--muted); font-family:'JetBrains Mono',monospace; }

.rep-count { font-size:1.4rem; font-weight:900; color:var(--accent); min-width:36px; text-align:right; }

.empty { text-align:center; padding:2.5rem 1rem; color:var(--muted); }
.empty .ei { font-size:2.5rem; margin-bottom:0.6rem; }

/* TOAST */
#toast {
  position:fixed; bottom:1.5rem; left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--nav); color:#fff;
  border-radius:12px;
  padding:0.85rem 1.4rem;
  font-size:0.88rem; font-weight:600;
  z-index:9999;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
  max-width:88vw;
  display:flex; align-items:center; gap:0.6rem;
}
#toast.show { transform:translateX(-50%) translateY(0); }

/* PRINT QR SHEET */
@media print {
  body * { visibility:hidden; }
  #print-area, #print-area * { visibility:visible; }
  #print-area { position:fixed; inset:0; background:#fff; padding:1rem; }
}

#print-area { display:none; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo-block">
      <div class="logo-main">📋 AsistenciaQR</div>
      <div class="logo-sub">C.E. Prof. Carlos Lobato</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPanel('scanner',this)">📷 Escanear</button>
      <button class="nav-tab" onclick="showPanel('students',this)">👨‍🎓 Alumnos</button>
      <button class="nav-tab" onclick="showPanel('logs',this)">📋 Registros</button>
      <button class="nav-tab" onclick="showPanel('report',this)">📊 Reporte</button>
    </div>
  </div>
</nav>

<main>

<!-- ======= ESCÁNER ======= -->
<div id="panel-scanner" class="panel active">
  <div class="card">
    <div class="card-title"><span class="card-icon">📷</span> Escáner de Asistencia — Maestro</div>

    <div class="status-bar">
      <span class="dot off" id="sdot"></span>
      <span id="stxt">Cámara apagada — presiona Iniciar</span>
    </div>

    <div class="scanner-wrap">
      <video id="scanner-video" autoplay playsinline muted></video>
      <canvas id="scanner-canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-line" id="scanline"></div>
      </div>
    </div>

    <div class="flex-row mt1">
      <button class="btn btn-primary" id="btnStart" onclick="startScan()">▶ Iniciar Cámara</button>
      <button class="btn btn-ghost" id="btnStop" onclick="stopScan()" style="display:none">⏹ Detener</button>
    </div>
  </div>

  <div id="att-result">
    <div class="att-icon" id="att-icon">✅</div>
    <div class="att-nombre" id="att-nombre"></div>
    <div class="att-sub" id="att-sub"></div>
    <div class="att-nie" id="att-nie"></div>
  </div>
</div>

<!-- ======= ALUMNOS ======= -->
<div id="panel-students" class="panel">
  <div class="card">
    <div class="card-title"><span class="card-icon">👨‍🎓</span> Lista de Alumnos — 100 registrados</div>

    <div class="flex-row" style="margin-bottom:1rem">
      <input type="text" id="stu-search" placeholder="🔍 Buscar por nombre o NIE..." style="flex:1;min-width:160px" oninput="renderStudents()">
      <button class="btn btn-green btn-sm" onclick="printAllQRs()">🖨 Imprimir todos los QR</button>
    </div>

    <div class="year-tabs">
      <button class="year-tab active" onclick="filterYear('all',this)">Todos (100)</button>
      <button class="year-tab" onclick="filterYear('1',this)">1° Año (43)</button>
      <button class="year-tab" onclick="filterYear('2',this)">2° Año (29)</button>
      <button class="year-tab" onclick="filterYear('3',this)">3° Año (28)</button>
    </div>

    <div id="student-grid" class="student-grid"></div>
  </div>
</div>

<!-- ======= REGISTROS ======= -->
<div id="panel-logs" class="panel">
  <div class="card">
    <div class="card-title"><span class="card-icon">📋</span> Historial de Asistencias</div>
    <div class="flex-row" style="margin-bottom:1rem">
      <input type="text" id="log-search" placeholder="🔍 Buscar..." style="flex:1;min-width:140px" oninput="renderLogs()">
      <select id="log-year" onchange="renderLogs()" style="min-width:110px">
        <option value="">Todos los años</option>
        <option value="1">1° Año</option>
        <option value="2">2° Año</option>
        <option value="3">3° Año</option>
      </select>
      <button class="btn btn-danger btn-sm" onclick="clearLogs()">🗑 Limpiar</button>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ CSV</button>
    </div>
    <div style="overflow-x:auto">
      <table class="log-table">
        <thead>
          <tr>
            <th>Nombre</th><th>NIE</th><th>Año</th><th>Fecha</th><th>Hora</th><th>Estado</th>
          </tr>
        </thead>
        <tbody id="logs-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ======= REPORTE ======= -->
<div id="panel-report" class="panel">
  <div class="card">
    <div class="card-title"><span class="card-icon">📊</span> Reporte Mensual de Asistencia</div>
    <div class="flex-row" style="margin-bottom:1.2rem">
      <select id="rep-month" onchange="renderReport()" style="min-width:170px"></select>
      <select id="rep-year-filter" onchange="renderReport()" style="min-width:110px">
        <option value="">Todos los años</option>
        <option value="1">1° Año</option>
        <option value="2">2° Año</option>
        <option value="3">3° Año</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ Exportar CSV</button>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div id="rep-list"></div>
  </div>
</div>

</main>

<!-- QR MODAL -->
<div class="modal-bg" id="qr-modal">
  <div class="modal">
    <h3 id="qm-name"></h3>
    <div class="modal-sub" id="qm-year"></div>
    <div class="modal-nie" id="qm-nie"></div>
    <div id="qr-wrap"></div>
    <div class="flex-row" style="justify-content:center">
      <button class="btn btn-primary btn-sm" onclick="printOneQR()">🖨 Imprimir</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');

let yearFilter = 'all';

function filterYear(y, btn) {
  yearFilter = y;
  document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderStudents();
}

function getInitials(nombre) {
  const parts = nombre.split(',');
  const apellido = (parts[0] || '').trim();
  const names = (parts[1] || '').trim().split(' ');
  return (apellido[0] || '') + (names[0]?.[0] || '');
}

function gradeLabel(y) {
  return y === '1' ? '1° Año' : y === '2' ? '2° Año' : '3° Año';
}
function gradeClass(y) {
  return y === '1' ? 'grade-1' : y === '2' ? 'grade-2' : 'grade-3';
}

function renderStudents() {
  const q = (document.getElementById('stu-search')?.value || '').toLowerCase();
  const list = STUDENTS_BASE.filter(s => {
    const matchYear = yearFilter === 'all' || s.year === yearFilter;
    const matchQ = !q || s.nombre.toLowerCase().includes(q) || s.nie.includes(q);
    return matchYear && matchQ;
  });

  const grid = document.getElementById('student-grid');
  if (!grid) return;

  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="ei">🔍</div><p>No se encontraron alumnos.</p></div>`;
    return;
  }

  grid.innerHTML = list.map(s => `
    <div class="stu-card" onclick="openQR('${s.nie}')">
      <div class="stu-av">${getInitials(s.nombre)}</div>
      <div class="stu-name">${s.nombre}</div>
      <div class="stu-nie">NIE: ${s.nie}</div>
      <span class="stu-grade ${gradeClass(s.year)}">${gradeLabel(s.year)} · Sección ${s.seccion}</span>
    </div>
  `).join('');
}

//  SCANNER
// ============================================================
let stream = null, scanInt = null, lastNIE = '', lastTime = 0;

async function startScan() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' }, audio:false });
    const v = document.getElementById('scanner-video');
    v.srcObject = stream;
    await v.play();

    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnStop').style.display = '';
    document.getElementById('sdot').className = 'dot on';
    document.getElementById('stxt').textContent = 'Cámara activa — apunta al código QR del alumno';
    document.getElementById('scanline').style.display = '';

    scanInt = setInterval(scanFrame, 200);
  } catch(e) {
    toast('❌ No se pudo acceder a la cámara: ' + e.message);
  }
}

function stopScan() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (scanInt) { clearInterval(scanInt); scanInt = null; }
  const v = document.getElementById('scanner-video');
  v.srcObject = null;

  document.getElementById('btnStart').style.display = '';
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('sdot').className = 'dot off';
  document.getElementById('stxt').textContent = 'Cámara apagada — presiona Iniciar';
  document.getElementById('scanline').style.display = 'none';
}

function scanFrame() {
  const v = document.getElementById('scanner-video');
  if (v.readyState !== v.HAVE_ENOUGH_DATA) return;

  const c = document.getElementById('scanner-canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  const ctx = c.getContext('2d');
  ctx.drawImage(v, 0, 0);

  const img = ctx.getImageData(0, 0, c.width, c.height);
  const code = jsQR(img.data, img.width, img.height, { inversionAttempts:'dontInvert' });

  if (code) {
    const now = Date.now();
    if (code.data === lastNIE && now - lastTime < 5000) return;
    lastNIE = code.data;
    lastTime = now;
    processAttendance(code.data);
  }
}

function processAttendance(scanned) {
  const student = NIE_INDEX[scanned.trim()];
  const now = new Date();
  const todayKey = now.toISOString().slice(0,10);
  const dateDisplay = now.toLocaleDateString('es-SV', { day:'2-digit', month:'2-digit', year:'numeric' });
  const timeStr = now.toLocaleTimeString('es-SV', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const res = document.getElementById('att-result');

  if (!student) {
    res.className = 'err'; res.style.display = 'block';
    document.getElementById('att-icon').textContent = '❌';
    document.getElementById('att-nombre').textContent = 'NIE no encontrado';
    document.getElementById('att-sub').textContent = 'Código escaneado: ' + scanned;
    document.getElementById('att-nie').textContent = 'Verifica que sea un QR del sistema';
    toast('❌ NIE no registrado en el sistema');
    return;
  }

  const logs = getLogs();
  const dup = logs.find(l => l.nie === student.nie && l.date === todayKey);

  if (dup) {
    res.className = 'dup'; res.style.display = 'block';
    document.getElementById('att-icon').textContent = '⚠️';
    document.getElementById('att-nombre').textContent = student.nombre;
    document.getElementById('att-sub').textContent = 'Ya fue registrado hoy a las ' + dup.time;
    document.getElementById('att-nie').textContent = 'NIE: ' + student.nie + ' · ' + gradeLabel(student.year);
    toast('⚠️ Asistencia ya registrada hoy');
    return;
  }

  // Registrar
  logs.unshift({
    nie: student.nie,
    nombre: student.nombre,
    year: student.year,
    seccion: student.seccion,
    date: todayKey,
    dateDisplay,
    time: timeStr,
    month: now.toISOString().slice(0,7)
  });
  setLogs(logs);

  res.className = 'ok'; res.style.display = 'block';
  document.getElementById('att-icon').textContent = '✅';
  document.getElementById('att-nombre').textContent = student.nombre;
  document.getElementById('att-sub').textContent = dateDisplay + ' · ' + timeStr;
  document.getElementById('att-nie').textContent = 'NIE: ' + student.nie + ' · ' + gradeLabel(student.year) + ' · Sección ' + student.seccion;
  toast('✅ Asistencia registrada: ' + student.nombre.split(',')[0]);
}

function renderLogs() {
  const q = (document.getElementById('log-search')?.value || '').toLowerCase();
  const yf = document.getElementById('log-year')?.value || '';
  const logs = getLogs().filter(l =>
    (!q || l.nombre.toLowerCase().includes(q) || l.nie.includes(q)) &&
    (!yf || l.year === yf)
  );

  const tbody = document.getElementById('logs-body');
  if (!tbody) return;

  if (!logs.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted)">Sin registros aún. Escanea el primer QR.</td></tr>`;
    return;
  }

  tbody.innerHTML = logs.map(l => `
    <tr>
      <td style="font-weight:700;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.nombre}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:0.72rem">${l.nie}</td>
      <td><span class="badge ${l.year==='1'?'badge-blue':l.year==='2'?'badge-green':''}" style="${l.year==='3'?'background:#fef3c7;color:#d97706':''}">${gradeLabel(l.year)}</span></td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:0.72rem">${l.dateDisplay}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:0.72rem">${l.time}</td>
      <td><span class="badge badge-green">✓ Presente</span></td>
    </tr>
  `).join('');
}

function clearLogs() {
  if (!confirm('¿Eliminar TODOS los registros de asistencia? Esta acción no se puede deshacer.')) return;
  setLogs([]);
  renderLogs();
  toast('🗑 Registros eliminados');
}

// ============================================================
//  REPORTE
// ============================================================
function populateMonths() {
  const sel = document.getElementById('rep-month');
  const logs = getLogs();
  const months = [...new Set(logs.map(l => l.month))].sort().reverse();
  const now = new Date().toISOString().slice(0,7);
  if (!months.includes(now)) months.unshift(now);
  sel.innerHTML = months.map(m => {
    const [y,mo] = m.split('-');
    const lbl = new Date(y,mo-1).toLocaleDateString('es-SV',{month:'long',year:'numeric'});
    return `<option value="${m}">${lbl.charAt(0).toUpperCase()+lbl.slice(1)}</option>`;
  }).join('');
}

function renderReport() {
  const month = document.getElementById('rep-month')?.value;
  const yf = document.getElementById('rep-year-filter')?.value || '';
  if (!month) return;

  const logs = getLogs().filter(l => l.month === month && (!yf || l.year === yf));
  const students = yf ? STUDENTS_BASE.filter(s => s.year === yf) : STUDENTS_BASE;

  const counts = {};
  students.forEach(s => { counts[s.nie] = { s, count:0 }; });
  logs.forEach(l => { if (counts[l.nie]) counts[l.nie].count++; });

  const entries = Object.values(counts).sort((a,b) => b.count - a.count);
  const totalDays = [...new Set(logs.map(l => l.date))].length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-box"><div class="stat-val">${totalDays}</div><div class="stat-lbl">Días con registro</div></div>
    <div class="stat-box"><div class="stat-val">${logs.length}</div><div class="stat-lbl">Asistencias totales</div></div>
    <div class="stat-box"><div class="stat-val">${students.length}</div><div class="stat-lbl">Alumnos</div></div>
  `;

  if (!entries.length || totalDays === 0) {
    document.getElementById('rep-list').innerHTML = `<div class="empty"><div class="ei">📊</div><p>Sin datos este mes todavía.</p></div>`;
    return;
  }

  document.getElementById('rep-list').innerHTML = entries.map(e => `
    <div class="rep-row">
      <div class="rep-av">${getInitials(e.s.nombre)}</div>
      <div class="rep-info">
        <div class="rep-name">${e.s.nombre}</div>
        <div class="rep-grade">${gradeLabel(e.s.year)} · NIE ${e.s.nie}</div>
      </div>
      <div class="prog-wrap">
        <div class="prog-bg"><div class="prog-fill" style="width:${Math.round(e.count/totalDays*100)}%"></div></div>
        <div class="prog-lbl">${Math.round(e.count/totalDays*100)}% — ${e.count}/${totalDays} días</div>
      </div>
      <div class="rep-count">${e.count}</div>
    </div>
  `).join('');
}

function exportCSV() {
  const month = document.getElementById('rep-month')?.value || '';
  const yf = document.getElementById('rep-year-filter')?.value || document.getElementById('log-year')?.value || '';
  const logs = getLogs().filter(l => (!month || l.month === month) && (!yf || l.year === yf));

  const header = 'NIE,Nombre,Año,Sección,Fecha,Hora\n';
  const rows = logs.map(l => `${l.nie},"${l.nombre}",${gradeLabel(l.year)},"${l.seccion}",${l.dateDisplay},${l.time}`).join('\n');
  const blob = new Blob(['\ufeff' + header + rows], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `asistencias-${month || 'todas'}.csv`;
  a.click();
  toast('⬇ CSV exportado correctamente');
}

// ============================================================
//  TOAST
// ============================================================
let toastT = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastT) clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 3500);
}

// INIT
renderStudents();
</script>
</body>
</html>
